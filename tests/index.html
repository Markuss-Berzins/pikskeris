<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <title>Pikšķerēšanas tests</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="container">

  <h2>Pikšķerēšanas tests</h2>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <p id="counter"></p>

  <img
    id="questionImage"
    alt="Piemērs"
    style="max-width:100%; border-radius:12px; margin: 20px 0;"
  />

<div>
  <button id="btnPhish" onclick="answer(true)">🚨 Phishing</button>
  <button id="btnSafe" onclick="answer(false)">✅ Nav phishing</button>
</div>

<p id="feedback"></p>

<button
  id="nextBtn"
  style="display:none; margin-top:20px;"
  onclick="nextQuestion()"
>
  Nākamais jautājums →
</button>

</div>

<script src="../script.js"></script>
</body>
</html>
